<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2e7d32">
  <title>Cotizador San Isidro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="launchericon-192x192.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
    body{background:linear-gradient(135deg,#2e7d32 0%,#66bb6a 100%);min-height:100vh;padding:15px}
    .container{max-width:900px;margin:0 auto;background:white;padding:25px;border-radius:15px;box-shadow:0 8px 30px rgba(0,0,0,0.2)}
    .header{text-align:center;margin-bottom:25px}
    .header h1{color:#2e7d32;font-size:28px;margin-bottom:5px}
    .header p{color:#666;font-size:14px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px}
    @media(max-width:768px){.grid{grid-template-columns:1fr}}
    .form-group{margin-bottom:15px}
    label{display:block;margin-bottom:6px;font-weight:600;color:#333;font-size:14px}
    input,select,textarea{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;transition:0.3s}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#2e7d32}
    .btn-group{display:flex;gap:10px;margin-top:20px}
    button{flex:1;background:#2e7d32;color:white;border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:0.3s}
    button:hover{background:#1b5e20;transform:translateY(-2px)}
    button.secondary{background:#757575}
    button.secondary:hover{background:#616161}
    .tabla{width:100%;border-collapse:collapse;margin-top:20px}
    .tabla th{background:#2e7d32;color:white;padding:12px;text-align:left;font-size:14px}
    .tabla td{padding:12px;border-bottom:1px solid #e0e0e0}
    .tabla tr:hover{background:#f5f5f5}
    .total-box{background:#e8f5e9;padding:20px;border-radius:10px;margin-top:20px;text-align:center}
    .total-label{font-size:16px;color:#333;margin-bottom:5px}
    .total-amount{font-size:36px;font-weight:700;color:#2e7d32}
    .atendido{margin-top:20px;text-align:center;color:#555;font-size:14px;border-top:2px solid #e0e0e0;padding-top:15px}
    .resultado{display:none}
    @media print{.btn-group,.form-group{display:none}.container{box-shadow:none}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Agropecuaria y Ferretería San Isidro</h1>
      <p>Sistema de Cotización Rápida</p>
    </div>
    
    <div id="formulario">
      <div class="grid">
        <div class="form-group">
          <label>Cliente</label>
          <input type="text" id="cliente" placeholder="Nombre del cliente">
        </div>
        <div class="form-group">
          <label>Fecha</label>
          <input type="date" id="fecha">
        </div>
      </div>

      <div class="grid">
        <div class="form-group">
          <label>Producto</label>
          <input type="text" id="producto" placeholder="Ej: Cemento Portland 50kg">
        </div>
        <div class="form-group">
          <label>Categoría</label>
          <select id="categoria">
            <option>Agropecuario</option>
            <option>Ferretería</option>
            <option>Construcción</option>
            <option>Jardín</option>
          </select>
        </div>
      </div>

      <div class="grid">
        <div class="form-group">
          <label>Cantidad</label>
          <input type="number" id="cantidad" placeholder="0" min="0" step="1">
        </div>
        <div class="form-group">
          <label>Precio Unitario Q</label>
          <input type="number" id="precio" placeholder="0.00" step="0.01" min="0">
        </div>
      </div>

      <div class="form-group">
        <label>Notas</label>
        <textarea id="notas" rows="2" placeholder="Observaciones adicionales"></textarea>
      </div>

      <div class="btn-group">
        <button onclick="agregarProducto()">+ Agregar Producto</button>
        <button class="secondary" onclick="limpiar()">Limpiar</button>
      </div>
    </div>

    <div id="resultado" class="resultado">
      <table class="tabla" id="tabla">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Categoría</th>
            <th>Cant.</th>
            <th>P. Unit</th>
            <th>Subtotal</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>

      <div class="total-box">
        <div class="total-label">Total Cotización</div>
        <div class="total-amount">Q<span id="total">0.00</span></div>
      </div>

      <div class="btn-group">
        <button onclick="window.print()">Imprimir / Guardar PDF</button>
        <button class="secondary" onclick="nuevaCotizacion()">Nueva Cotización</button>
      </div>

      <div class="atendido">
        <strong>Cliente:</strong> <span id="r-cliente"></span><br>
        <strong>Fecha:</strong> <span id="r-fecha"></span><br>
        Atendido por: <strong>MELVIN LEMUS</strong>
      </div>
    </div>
  </div>

  <script>
    let productos = [];
    let total = 0;

    document.getElementById('fecha').valueAsDate = new Date();

    function agregarProducto(){
      const producto = document.getElementById('producto').value;
      const categoria = document.getElementById('categoria').value;
      const cantidad = parseFloat(document.getElementById('cantidad').value) || 0;
      const precio = parseFloat(document.getElementById('precio').value) || 0;

      if(!producto || cantidad <= 0 || precio <= 0){
        alert('Completa todos los campos del producto');
        return;
      }

      const subtotal = cantidad * precio;
      productos.push({producto,categoria,cantidad,precio,subtotal});
      total += subtotal;

      actualizarTabla();
      limpiarCampos();
      document.getElementById('resultado').style.display = 'block';
    }

    function actualizarTabla(){
      const tbody = document.getElementById('tabla-body');
      tbody.innerHTML = '';
      productos.forEach(p => {
        tbody.innerHTML += `
          <tr>
            <td>${p.producto}</td>
            <td>${p.categoria}</td>
            <td>${p.cantidad}</td>
            <td>Q${p.precio.toFixed(2)}</td>
            <td>Q${p.subtotal.toFixed(2)}</td>
          </tr>
        `;
      });
      document.getElementById('total').textContent = total.toFixed(2);
      document.getElementById('r-cliente').textContent = document.getElementById('cliente').value || 'Consumidor Final';
      document.getElementById('r-fecha').textContent = document.getElementById('fecha').value;
    }

    function limpiarCampos(){
      document.getElementById('producto').value = '';
      document.getElementById('cantidad').value = '';
      document.getElementById('precio').value = '';
      document.getElementById('notas').value = '';
    }

    function limpiar(){
      if(confirm('¿Limpiar toda la cotización?')){
        productos = [];
        total = 0;
        actualizarTabla();
        document.getElementById('resultado').style.display = 'none';
      }
    }

    function nuevaCotizacion(){
      limpiar();
      document.getElementById('cliente').value = '';
      document.getElementById('fecha').valueAsDate = new Date();
    }

    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
          </html>
